name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            python-arch: x64
          - os: windows-latest
            platform: win
            python-arch: x64
          - os: ubuntu-latest
            platform: linux
            python-arch: x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Python + PyInstaller
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python-arch }}

      - name: Install Python deps + PyInstaller
        run: pip install "pyinstaller>=6.0,<7" -e ".[dev]"

      # Build the React UI so it can be bundled into the Python binary
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build React UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      # Bundle Python + UI into a single binary
      - name: Run PyInstaller
        run: pyinstaller talon-server.spec

      # -----------------------------------------------------------------------
      # Electron + electron-builder
      # -----------------------------------------------------------------------
      - name: Inject OAuth credentials into Electron
        env:
          GH_CLIENT_ID: ${{ secrets.TALON_GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.TALON_GH_CLIENT_SECRET }}
        run: |
          node -e "
          const fs = require('fs');
          let src = fs.readFileSync('electron/main.js', 'utf8');
          src = src.replace('__GITHUB_CLIENT_ID__', process.env.GH_CLIENT_ID || '');
          src = src.replace('__GITHUB_CLIENT_SECRET__', process.env.GH_CLIENT_SECRET || '');
          fs.writeFileSync('electron/main.js', src);
          "

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build Electron app (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false  # skip code signing without a cert
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac

      - name: Build Electron app (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Build Electron app (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get install -y libgtk-3-0 libnotify-dev libnss3 libxss1 libasound2t64
          npm run build:linux

      # -----------------------------------------------------------------------
      # Upload installers as GitHub Release assets
      # -----------------------------------------------------------------------
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | Windows | `Talon Setup *.exe` |
            | macOS (Apple Silicon) | `Talon-*-arm64.dmg` |
            | macOS (Intel) | `Talon-*.dmg` (non-arm64) |
            | Linux | `Talon-*.AppImage` |

            > **Note:** Builds are unsigned. On macOS right-click → Open to bypass Gatekeeper. On Windows click "More info → Run anyway" if SmartScreen appears.
          files: |
            release/Talon Setup *.exe
            release/*.dmg
            release/*.AppImage

      # Also upload as workflow artifacts for non-tag builds (testing)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: talon-${{ matrix.platform }}
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*.exe
            release/**/*.AppImage
          if-no-files-found: warn
